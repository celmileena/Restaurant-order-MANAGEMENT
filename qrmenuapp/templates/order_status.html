

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="30">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Status</title>


</head>

<body>

<div class="status-card">

    <h2>Order #{{ order.id }}</h2>

    <div class="status-badge {{ order.Status|lower }}">
        {{ order.Status }}
    </div>

    <div class="table">
        Table {{ order.Table.number }}
    </div>

    <div class="message">
        {% if order.Status == "Pending" %}
            The kitchen has received your order!
        {% elif order.Status == "Cooking" %}
           Preparing your meal right now!
        {% elif order.Status == "Done"  %}
            Your order is ready.Enjoy!
        {% endif %}
    </div>



</div>

</body>
<style>
:root{
    --pending:#FF9800;
    --cooking:#2196F3;
    --done:#4CAF50;
    --bg:#f5f5f5;
}

body{
    background:var(--bg);
    font-family:Segoe UI, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.status-card{
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
    width:320px;
    text-align:center;
}

.status-badge{
    display:inline-block;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    margin:15px 0;
}

.pending{background:#ffe0b2;color:var(--pending);}
.cooking{background:#bbdefb;color:var(--cooking);}
.done{background:#c8e6c9;color:var(--done);}

h2{
    color:#D32F2F;
}

.table{
    font-size:18px;
    margin:10px 0;
}

.message{
    font-size:16px;
    margin-top:15px;
}
</style>
</html>
