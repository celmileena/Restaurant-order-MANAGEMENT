<!DOCTYPE html>
{% extends 'Dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Staff</title>
</head>

<body>
<div class="container">
  <div class="page-inner">
    <h3 class="fw-bold mb-3">Edit Staff</h3>

    <form method="POST" action="{%url 'update_staff' sid=staff.id%}" class="card p-4 shadow">
      {% csrf_token %}

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Staff Username</label>
        <input type="text" name="username" value="{{ staff.username }}" class="form-control" required>
      </div>

      <!-- Change Password -->
      <div class="mb-3">
        <label class="form-label">New Password/blank for no change</label>
        <input type="password" name="password" class="form-control">
      </div>
      <!-- Active Status -->
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="active"
               {% if staff.is_active %} checked {% endif %}>
        <label class="form-check-label">Active</label>
      </div>

      <!-- Buttons -->
      <div>
        <button type="submit" class="btn btn-primary">Update</button>
      </div>

    </form>
  </div>
</div>

<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

{% if messages %}
    {% for i in messages %}
        <script>
            swal('{{ i }}', '', '{{ i.tags }}')
        </script>
    {% endfor %}
{% endif %}

{% endblock %}
</body>
</html>
