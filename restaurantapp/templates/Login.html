<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Admin/Staff Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="login-box">
        <div class="logo"></div>
        <h2>ADMIN/STAFF Login</h2>

        <form action="{% url 'loginview' %}" method="POST" onsubmit="return validateForm()">
            {% csrf_token %}
            <input type="text" name="username" id="username"   placeholder="Enter Username" >

            <span id="unameerror" class="text-danger small" ></span>
            <input type="password" name="password" id="password" autocomplete="new-password"  placeholder="Enter Password" >
            <span id="pswderror" class="text-danger small"></span>
            <button type="submit">Login</button>
        </form>
    </div>




  <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .login-box input:focus {
            border-color: #ff5e62;
            box-shadow: 0 0 5px rgba(255,94,98,0.5);
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #ff5e62;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #ff3b3f;
        }

        .logo {
            font-size: 28px;
            margin-bottom: 10px;
        }
    </style>

<script>
const uname = document.getElementById("username");
const pswd = document.getElementById("password");


uname.addEventListener("input", function(){
    if(uname.value === ""){
        document.getElementById("unameerror").innerText = "Username required";
    } else {
        document.getElementById("unameerror").innerText = "";
    }
});


pswd.addEventListener("input", function(){
    if(pswd.value === ""){
        document.getElementById("pswderror").innerText = "Password required";
    }
    else if(pswd.value.length < 6){
        document.getElementById("pswderror").innerText = "Minimum 6 characters required";
    }
    else{
        document.getElementById("pswderror").innerText = "";
    }
});


function validateForm(){
    if(uname.value === ""){
        document.getElementById("unameerror").innerText = "Username required";
        return false;
    }

    if(pswd.value === ""){
        document.getElementById("pswderror").innerText = "Password required";
        return false;
    }
    else if(pswd.value.length < 6){
        document.getElementById("pswderror").innerText = "Minimum 6 characters required";
        return false;
    }


}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

{% if messages %}
    {% for i in messages %}

        {% if i.tags == 'success' %}
            <script>
                swal('{{ i }}', '','success')
            </script>

        {% elif i.tags == 'warning' %}
            <script>
                swal('{{ i }}', '','warning')
            </script>

        {% elif i.tags == 'error' %}
            <script>
                swal('{{ i }}', '','error')
            </script>

        {% elif i.tags == 'info' %}
            <script>
                swal('{{ i }}', '','info')
            </script>

        {% endif %}
    {% endfor %}
{% endif %}


</body>
</html>
